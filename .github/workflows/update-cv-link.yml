name: Update portfolio CV link

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/update-cv-link.yml"

permissions:
  contents: write

jobs:
  update-link:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace old CV link
        run: |
          python - <<'PY'
          from pathlib import Path

          file_path = Path("index.html")
          old_url = "https://drive.google.com/file/d/199vBhV0fz6_Ekdko8rEZfcgluxttr081/view?usp=drive_link"
          new_url = "https://drive.google.com/file/d/1rfQZHQ1cK7uzIsHHKLWqIZLtU7mVXk6z/view?usp=sharing"

          content = file_path.read_text(encoding="utf-8")
          updated = content.replace(old_url, new_url)

          if updated == content:
              raise SystemExit("Old CV link was not found or has already been updated.")

          file_path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit updated portfolio link
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update portfolio CV link"
          git push
