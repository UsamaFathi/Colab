name: Update portfolio CV link

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/update-cv-link.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-link:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace CV links
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("index.html")
          content = path.read_text(encoding="utf-8")
          new_url = "https://drive.google.com/file/d/1d0N2prDLYcHK0BBR2kyFvR5sYT5k2N8k/view?usp=drive_link"
          updated = re.sub(
              r"https://drive\.google\.com/file/d/[^\"']+",
              new_url,
              content,
          )

          if updated == content:
              print("No CV links needed updating.")
          else:
              path.write_text(updated, encoding="utf-8")
              print("Portfolio CV links updated.")
          PY

      - name: Commit updated portfolio
        run: |
          if git diff --quiet -- index.html; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update portfolio CV link"
          git push
